{% set name = "knack" %}
{% set version = "0.11.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: eb6568001e9110b1b320941431c51033d104cc98cda2254a5c2b09ba569fd494

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - pip
    - python
    - wheel
    - setuptools
  run:
    - python
    - argcomplete
    - jmespath
    - packaging
    - pygments
    - pyyaml
    - tabulate

test:
  source_files:
    - tests
  imports:
    - knack
    - knack.testsdk
  commands:
    - pip check
    - pytest -v tests
  requires:
    - pip
    - mock
    - pytest
    - vcrpy

about:
  home: https://github.com/microsoft/knack
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A Command-Line Interface framework
  description: A Command-Line Interface framework
  doc_url: https://github.com/Microsoft/knack/tree/master/docs
  dev_url: https://github.com/microsoft/knack

extra:
  recipe-maintainers:
    - andreyz4k
